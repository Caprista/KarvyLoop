<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KarvyLoop Console</title>
  <link rel="icon" type="image/png" href="/static/assets/karvyloop-logo-64.png" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/vendor/highlight-github.min.css" />
  <link rel="stylesheet" href="/static/vendor/drawflow.min.css" />   <!-- 工作流拖拽画布(Drawflow,MIT) -->
  <link rel="stylesheet" href="/static/desktop.css" />   <!-- 桌面视图(docs/51):须在 styles.css 之后,desk 规则压过对话视图规则 -->
</head>
<body>
  <!-- 9.4c 暖色品牌系重构:左导航(管理面)/ 中对话+IP 主视觉 / 右上下文。
       所有功能性 id 保持不变(JS 接线不动);看板从 5 列收进右侧上下文栏。 -->
  <div class="app" id="app">

    <!-- 顶栏:品牌(IP+标题)+ 脉搏 + 统计 + 成本 + 小卡 + 语言(驾驶舱仪表盘条) -->
    <header class="topbar">
      <div class="brand">
        <!-- IP 主视觉:卡皮巴拉 + 头顶发光 ∞ + 叼绿叶(Hardy 定稿 logo) -->
        <img class="brand-logo" src="/static/assets/karvyloop-logo.png" alt="KarvyLoop" />
        <span class="brand-name" data-i18n="ui.title">KarvyLoop</span>
      </div>
      <!-- 脉搏 = 顶栏主位:有没有任务在跑 / 有没有卡等拍板(朋友调研:这才是决策者要瞟的) -->
      <span class="pulse-chip" id="pulse-text" data-i18n="cockpit.pulse_idle">小卡在看着你的工作台</span>
      <div class="topbar-spacer"></div>
      <!-- 统计 + token 成本表:降级为次级小字(成本仍可见可点开,但不抢主位) -->
      <div class="topbar-secondary">
        <div class="topbar-stats" id="stats">
          <span id="stat-drives">drives: —</span>
          <span class="fast-brain" id="stat-fast-brain">fast-brain: —</span>
          <span class="crystallizations" id="stat-crystallized">crystallized: —</span>
        </div>
        <span class="token-meter" id="token-meter" data-i18n-title="cockpit.token_title">💰 —</span>
      </div>
      <!-- 冒泡动效(karvy-bubble)保留:挂在顶栏右侧,元素隐形只做锚点(【你的副驾】按钮
           按 Hardy 2026-07-03 拍板撤下;小卡入场感交给右下角常驻形象与桌面隐喻演进) -->
      <div class="topbar-karvy-anchor" id="topbar-karvy" aria-hidden="true">
        <div class="karvy-bubble hidden" id="karvy-bubble"><span class="karvy-bubble-dots">·</span></div>
      </div>
      <div class="top-actions">
        <!-- 一主一副(docs/59 方案A):💬 对话=唯一的家(默认、永远回得来)⇄ 🖥 桌面=旁观你的团队上班。
             看板不再是并列的"家":四象限 2×2 全屏降级为右栏 rail 的 ⛶ 临时放大态(Esc/✕ 回对话)。 -->
        <div class="view-switch" id="view-switch" role="tablist">
          <button class="view-switch-opt active" id="view-opt-chat" data-i18n="view.chat" data-i18n-title="view.chat.title">💬 对话</button>
          <button class="view-switch-opt" id="view-opt-desk" data-i18n="view.desk" data-i18n-title="view.desk.title">🖥 桌面</button>
        </div>
        <!-- docs/46 S4:重看新手引导(首启 tour 可跳过,这里随时唤回) -->
        <button class="tour-replay" id="tour-replay" data-i18n-title="tour.replay.title">💡</button>
        <!-- 「第一个 10 分钟」旅程重看入口(可跳过、可重入) -->
        <button class="tour-replay" id="journey-replay" data-i18n-title="journey.replay.title">🎬</button>
        <!-- 随包演示实例(小林/Lin):看一个用了一周的"满级号",只读浏览(demo_panel.js) -->
        <button class="tour-replay" id="demo-open" data-i18n-title="demo.entry.title">👀</button>
        <span class="lang-switcher" id="lang-switcher"></span>
      </div>
    </header>

    <!-- 左导航:管理面入口 + 对话控件 + 统计 -->
    <nav class="sidebar">
      <div class="nav-group">
        <div class="nav-group-title" data-i18n="nav.manage">Manage</div>
        <button class="nav-item" data-panel="domains">
          <span class="nav-ico">📂</span><span data-i18n="nav.domains">Business Domains</span>
        </button>
        <button class="nav-item" data-panel="roles">
          <span class="nav-ico">◑</span><span data-i18n="nav.roles">Roles</span>
        </button>
        <button class="nav-item" data-panel="atoms">
          <span class="nav-ico">⬡</span><span data-i18n="nav.atoms">Atom Agents</span>
        </button>
        <button class="nav-item" data-panel="agents">
          <span class="nav-ico">⊞</span><span data-i18n="nav.agents">External Agents</span>
        </button>
        <button class="nav-item" data-panel="memory">
          <span class="nav-ico">🧠</span><span data-i18n="nav.memory">Knowledge</span>
        </button>
        <button class="nav-item" data-panel="decision_prefs">
          <span class="nav-ico">🧭</span><span data-i18n="nav.decision_prefs">Decision Preferences</span>
        </button>
        <button class="nav-item" data-panel="skills">
          <span class="nav-ico">🧩</span><span data-i18n="nav.skills">Skill Library</span>
        </button>
        <button class="nav-item" data-panel="models">
          <span class="nav-ico">🤖</span><span data-i18n="nav.models">Models (global)</span>
        </button>
        <button class="nav-item" data-panel="diagnose">
          <span class="nav-ico">🩺</span><span data-i18n="nav.diagnose">Diagnose</span>
        </button>
        <button class="nav-item" data-panel="files">
          <span class="nav-ico">📁</span><span data-i18n="nav.files">Files</span>
        </button>
        <button class="nav-item" data-panel="schedules">
          <span class="nav-ico">⏰</span><span data-i18n="nav.schedules">Scheduled</span>
        </button>
      </div>


      <div class="nav-spacer"></div>
    </nav>

    <!-- 中央:决策者的指挥台(docs/46 裁决:对话+驾驶舱同屏)。
         默认「对话视图」= 聊天常驻中央 + 四象限压成右侧 rail;
         body.board-view = rail 的 ⛶ 临时放大态(2×2 全屏,docs/59:临时形态不是家)。-->
    <main class="cockpit">
      <!-- 全局聊天(chat-panel 出狱,docs/46 S1):对话视图下常驻中央;
           rail 放大态 / 移动端(≤720px)下保持原 modal-overlay 弹层行为。
           所有功能性 id(chat-log/chat-form/peer-list/roundtable-bar/…)原样保留。 -->
      <div class="modal-overlay chat-overlay chat-host hidden" id="chat-modal">
        <div class="chat-panel">
          <div class="chat-panel-head">
            <img class="chat-panel-avatar" src="/static/assets/karvy-capybara.png" alt="Karvy" />
            <span class="modal-title" id="chat-title" data-i18n="chat.title">💬 你 & 小卡</span>
            <span class="chat-head-spacer"></span>
            <button class="modal-close" id="chat-modal-close" aria-label="close">✕</button>
          </div>
          <div class="chat-panel-body">
            <!-- 左:纯聊天列表(可聊对象一行行展开,点谁跟谁聊)。
                 由 refreshPeers() 渲染 → switchPeer();群场(大群/业务域)分隔在下。 -->
            <aside class="chat-panel-side">
              <div class="chat-side-label up" data-i18n="chat.peers">Conversations</div>
              <div id="peer-list" class="peer-list"></div>
            </aside>
            <!-- 右:正文(对话流 + 圆桌阶段条 + 输入 + 频道内操作栏) -->
            <main class="chat-panel-main">
              <div class="chat-log" id="chat-log"></div>
              <!-- ch4 圆桌阶段0:对齐目标中 → 你拍板【开始讨论】 -->
              <div class="roundtable-bar hidden" id="roundtable-bar"></div>
              <!-- 「第一个 10 分钟」新手旅程:两步真演示(真模型跑)→ 亲眼看方法复用回执 + 成长曲线第一批点 -->
              <div class="journey-bar hidden" id="journey-bar"></div>
              <!-- ch4 #1:群里 @ 角色 —— 行内高亮 @花名(可多个、整体删),输 @ 弹角色选择器 -->
              <div class="chat-input-wrap">
                <div class="mention-pop hidden" id="mention-pop"></div>
                <form class="chat-input" id="chat-form">
                  <div
                    id="chat-input"
                    class="chat-input-ce is-empty"
                    contenteditable="true"
                    role="textbox"
                    aria-multiline="false"
                    data-i18n-ph="input.placeholder"
                  ></div>
                  <!-- 多模态附件:图(发图问)/ 文本·Markdown(发文档问)缩略预览,可单删 -->
                  <div class="chat-attachments hidden" id="chat-attachments"></div>
                  <input type="file" id="chat-attach-input" class="hidden" multiple
                         accept="image/*,.md,.markdown,.txt,.json,.csv,.log,.py,.js,.ts,.html,.css,.yaml,.yml,.xml" />
                  <!-- WeChat 式频道内操作栏:附件 + 新对话/历史(每个频道内的功能) + 圆桌(仅群场:
                       业务域 / karvy world 才有,_toggleRoundtableBtn 控显隐) + 发送 -->
                  <!-- 频道内操作:图标按钮(hover 出气泡说明),不再堆文字 -->
                  <div class="chat-toolbar">
                    <button type="button" id="chat-attach-btn" class="chat-tool-btn icon-btn" data-i18n-tip="btn.attach.title" data-i18n-title="btn.attach.title">📎</button>
                    <!-- 语音输入 v1:默认隐藏,主逻辑脚本做能力探测(Web Speech API)支持才亮;识别只填输入框,Enter 才发 -->
                    <button type="button" id="chat-voice-btn" class="chat-tool-btn icon-btn hidden" data-i18n-tip="voice.btn.title" data-i18n-title="voice.btn.title">🎤</button>
                    <button type="button" id="conv-new-btn" class="chat-tool-btn icon-btn" data-i18n-tip="btn.conv_new.title" data-i18n-title="btn.conv_new.title">🆕</button>
                    <!-- docs/66:收敛 —— 这段对话总结成分层认知,逐条确认后沉淀;沉了才关会话 -->
                    <button type="button" id="conv-converge-btn" class="chat-tool-btn icon-btn" data-i18n-tip="btn.converge.title" data-i18n-title="btn.converge.title">⚗️</button>
                    <!-- 开着的会话数 = 没沉淀的欠账(refreshConversations 填;≤1 隐藏) -->
                    <span id="conv-unsettled" class="conv-unsettled hidden" data-i18n-title="conv.unsettled.title"></span>
                    <select id="conv-history" class="chat-hist chat-tool-sel" data-i18n-title="sel.history.title">
                      <option value="">🕘</option>
                    </select>
                    <button type="button" id="roundtable-btn" class="chat-tool-btn icon-btn rt-btn hidden" data-i18n-tip="rt.open.title" data-i18n-title="rt.open.title">🎡</button>
                    <span class="chat-toolbar-spacer"></span>
                    <button type="submit" id="chat-send" class="chat-send-btn" data-i18n="btn.send">Send</button>
                  </div>
                </form>
              </div>
            </main>
          </div>
        </div>
      </div>

      <!-- 四象限:对话视图=右侧 rail 竖排(⚖永远第一→🔄→📥→🔮);⛶=临时放大成 2×2 全屏(Esc/✕ 回对话) -->
      <div class="cockpit-grid">
        <section class="cockpit-col col-decide">
          <h2 class="col-head"><span data-i18n="cockpit.decide">⚖ 要我拍什么板</span>
            <span class="col-acts">
              <button id="propose-btn" class="col-act" data-i18n="btn.propose" data-i18n-title="btn.propose.title">🔮</button>
              <button id="rail-zoom-btn" class="col-act" data-i18n-title="rail.zoom.title" aria-label="zoom quadrants">⛶</button>
            </span></h2>
          <div class="col-scroll">
            <div id="h2a-list"><div class="h2a-empty" data-i18n="empty.h2a">no proposals</div></div>
            <div class="recent-head" data-i18n="decisions.recent_head">🗳 最近拍板</div>
            <div id="recent-decisions"><div class="empty-state" data-i18n="empty.recent_decisions">—</div></div>
          </div>
        </section>
        <!-- 移动端顺序(docs/46 §4.3):脉搏(顶栏)→ ⚖拍板 → 聊天入口大按钮 → 其余象限。
             桌面端 display:none(聊天已常驻/rail 放大态走 FAB)。 -->
        <button class="mobile-chat-entry" id="mobile-chat-open" data-i18n="chat.open">💬 跟小卡说…</button>
        <section class="cockpit-col col-intel">
          <h2 class="col-head" data-i18n="cockpit.intel">📥 流进来的料</h2>
          <div class="col-scroll">
            <!-- ⑤c 环境感知召回:你说了什么 → 相关技能⚡/知识📚主动浮出(WS ambient_recall)。
                 无料时整块 display:none 不占位(朋友调研:空态别占地)。 -->
            <div id="ambient-recall" class="ambient-recall hidden"></div>
            <div id="task-board"><div class="empty-state" data-i18n="empty.task_board">no tasks yet</div></div>
            <div class="material-bar hidden" id="material-bar"></div>
          </div>
        </section>
        <section class="cockpit-col col-predict">
          <h2 class="col-head"><span data-i18n="cockpit.predict">🔮 你可能想做</span>
            <button id="predict-refresh-btn" class="col-act" data-i18n="btn.predict_refresh" data-i18n-title="btn.predict_refresh.title">⟳</button></h2>
          <div class="col-scroll">
            <div id="predict-list"><div class="empty-state" data-i18n="empty.predict">—</div></div>
          </div>
        </section>
        <section class="cockpit-col col-busy">
          <h2 class="col-head" data-i18n="cockpit.busy">🔄 谁在忙</h2>
          <div class="col-scroll">
            <div id="busy-list"><div class="empty-state" data-i18n="empty.busy">—</div></div>
          </div>
        </section>
      </div>

    </main>

    <!-- 又懂了你(技能/认知)收进抽屉,保留 id 供 renderSnapshot/pollKnowledge 写入 -->
    <aside class="learn-drawer" id="learn-drawer" hidden>
      <div id="skill-list"></div>
      <div id="knowledge-list"></div>
    </aside>

    <!-- 管道(非驾驶座主视:域/上次/广播)收进可折叠抽屉,仍保留 id 供 renderSnapshot 写入 -->
    <aside class="context-drawer" id="context-drawer" hidden>
      <div id="domain-list"></div>
      <div id="last-drive"></div>
      <div id="broadcast-list"></div>
    </aside>

    <!-- 9.5 #3:管理面模态(原子库 / 角色库 / 业务域)— 点左导航打开 -->
    <div class="modal-overlay hidden" id="mgmt-modal">
      <div class="modal">
        <div class="modal-head">
          <span class="modal-title" id="mgmt-title">—</span>
          <button class="modal-close" id="mgmt-close" aria-label="close">✕</button>
        </div>
        <div class="modal-body" id="mgmt-body"></div>
      </div>
    </div>

    <!-- 全局悬浮聊天入口(右下角常驻):小卡 = 统一对话入口 ——
         私聊 / 业务域 / 圆桌都从这进(切场在弹起的聊天里完成)。
         未来可在此并一个语音入口(voice),两个入口共用同一套对话。 -->
    <div class="karvy-dock">
      <!-- 冒泡动效已移到顶栏副驾按钮头上(docs/46 S2) -->
      <span class="karvy-dock-label" data-i18n="chat.open">跟小卡说…</span>
      <button class="karvy-fab" id="chat-open" data-i18n-title="chat.open" aria-label="Talk to Karvy">
        <img src="/static/assets/karvy-capybara.png" alt="Karvy" />
      </button>
    </div>

    <!-- 桌面视图 dock(docs/51):左段 = 左导航 12 入口同构复用(desktop.js 渲染,
         setupMgmtPanels 同一批绑定命中);右段 = 窗口指示 + ↺重置布局。非桌面视图 display:none -->
    <div class="desk-dock" id="desk-dock" role="toolbar" data-i18n-title="desk.dock"></div>
  </div>

  <!-- 渲染层:markdown-it + DOMPurify 现已打包进 render.js(Vite/TS,源在 console/frontend/);
       highlight.js 仍 vendored(大、可选增强,后续 slice 再迁)。render.js 须在主逻辑脚本之前。 -->
  <script src="/static/vendor/highlight.min.js"></script>
  <script src="/static/dom.js"></script>
  <script src="/static/modal.js"></script>
  <script src="/static/ui_widgets.js"></script>
  <script src="/static/files_panel.js"></script>
  <script src="/static/schedules_panel.js"></script>
  <script src="/static/diagnose_panel.js"></script>
  <script src="/static/atoms_panel.js"></script>
  <script src="/static/roles_panel.js"></script>
  <script src="/static/domains_panel.js"></script>
  <script src="/static/agents_panel.js"></script>
  <script src="/static/skills_panel.js"></script>
  <script src="/static/unlock_panel.js"></script>
  <script src="/static/demo_panel.js"></script>
  <script src="/static/memory_panel.js"></script>
  <script src="/static/models_panel.js"></script>
  <script src="/static/decision_prefs_panel.js"></script>
  <script src="/static/tokens_panel.js"></script>
  <script src="/static/render.js"></script>
  <script src="/static/i18n.js"></script>
  <!-- 桌面视图(docs/51):须在 app.js 之前 —— dock 按钮要先于 setupMgmtPanels 存在(同一批绑定) -->
  <script src="/static/desktop.js"></script>
  <!-- Drawflow 画布脚本(~70KB)不在此常驻:点「编辑画布」时由 app.js 按需注入(_ensureWorkflowCanvas) -->
  <script src="/static/app.js"></script>
</body>
</html>
