<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#060B0B" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#ECF1F0" media="(prefers-color-scheme: light)">
<title>KarvyLoop</title>
<style>
/* 📱 /m 手机拍板页 —— 动态比例连续布局:一套 grid 随容器宽度流动(minmax auto-fill),
   折叠屏开合中途实时重排;没有写死的手机/平板两套。低地板:本页零生造名词。 */
:root {
  /* 深墨绿系(docs/DESIGN.md;dark 默认,系统浅色偏好走镜像) */
  --bg: #060B0B; --card: #0E1C1A; --border: #1B2B29; --text: #E5EDEB; --text-2: #93A7A2;
  --accent: #27D3A5; --accent-soft: rgba(39,211,165,0.13); --rose: #E0487F; --rose-soft: rgba(224,72,127,0.13);
  --amber: #D9A441; --amber-soft: rgba(217,164,65,0.12); --on-accent: #06110D;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #ECF1F0; --card: #FFFFFF; --border: #D9E4E1; --text: #12211E; --text-2: #465954;
    --accent: #0E9E77; --accent-soft: rgba(14,158,119,0.10); --rose: #C43268; --rose-soft: rgba(196,50,104,0.10);
    --amber: #B07E1E; --amber-soft: rgba(176,126,30,0.10); --on-accent: #FFFFFF;
  }
}
* { box-sizing: border-box; margin: 0; }
body {
  background: var(--bg); color: var(--text); min-height: 100vh;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.m-header {
  display: flex; align-items: center; gap: 10px; padding: 14px 18px;
  border-bottom: 1px solid var(--border); background: var(--card);
  position: sticky; top: 0; z-index: 10;
}
.m-brand { font-weight: 700; font-size: 17px; }
.m-waiting { margin-left: auto; font-size: 14px; color: var(--text-2); display: flex; align-items: center; gap: 6px; }
#m-count { background: var(--rose); color: #fff; border-radius: 10px; padding: 1px 8px; font-size: 12px; }
/* 玫红计数上白字两主题都够对比;accent 实底按钮走 --on-accent(暗主题绿亮须压深字) */
#m-count:empty { display: none; }
#m-refresh, #m-remote { border: 1px solid var(--border); background: var(--card); border-radius: 8px;
  padding: 4px 10px; font-size: 15px; cursor: pointer; }
#m-remote.on { border-color: var(--accent); background: var(--accent-soft); }
#m-remote-chip { font-size: 13px; }
#m-list {
  display: grid; gap: 14px; padding: 16px;
  grid-template-columns: repeat(auto-fill, minmax(min(420px, 100%), 1fr));
  max-width: 1100px; margin: 0 auto;
}
.m-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 14px;
  padding: 16px; transition: opacity .3s, transform .3s;
}
.m-card-busy { opacity: .55; pointer-events: none; }
.m-card-done { opacity: 0; transform: translateY(-8px); }
.m-card-summary { font-size: 16px; line-height: 1.5; font-weight: 600; }
.m-card-basis { margin-top: 8px; font-size: 13px; line-height: 1.55; color: var(--text-2); }
.m-btn-row { display: flex; gap: 10px; margin-top: 14px; }
.m-btn {
  flex: 1; padding: 12px 0; font-size: 15px; font-weight: 600; border-radius: 10px;
  border: 1px solid var(--border); cursor: pointer; min-height: 46px;   /* 拇指高度 */
  transition: transform 150ms cubic-bezier(0.4,0,0.2,1);
}
.m-btn:active { transform: scale(.97); }   /* 拇指按下的确认感 */
.m-btn-accept { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
.m-btn-defer  { background: var(--amber-soft);  color: var(--amber); }
.m-btn-reject { background: var(--rose-soft);   color: var(--rose); }
.m-empty { grid-column: 1 / -1; text-align: center; color: var(--text-2); padding: 56px 20px; font-size: 15px; }
.m-empty-ico { font-size: 44px; margin-bottom: 10px; }
.m-toast {
  position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 10px;
  font-size: 14px; z-index: 99;
  animation: m-rise 240ms cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes m-rise { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 1ms !important; transition-duration: 1ms !important; }
}
/* 聊天:发起入口。气泡区默认收着(开屏=纯拍板台),第一句话才长出来;输入条钉底。 */
#m-chat-log {
  display: none; max-width: 1100px; margin: 0 auto; padding: 4px 16px 12px;
}
#m-chat-log.on { display: block; }
.m-bubble {
  max-width: 86%; padding: 10px 14px; border-radius: 14px; margin-top: 8px;
  font-size: 15px; line-height: 1.55; white-space: pre-wrap; word-break: break-word;
  border: 1px solid var(--border); background: var(--card);
}
.m-bubble-you { margin-left: auto; background: var(--accent-soft); border-color: var(--accent); width: fit-content; }
.m-bubble-karvy { margin-right: auto; width: fit-content; }
.m-thinking { color: var(--text-2); font-style: italic; }
.m-chat-bar {
  position: fixed; left: 0; right: 0; bottom: 0; display: flex; gap: 8px;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  background: var(--card); border-top: 1px solid var(--border); z-index: 20;
}
#m-chat-input {
  flex: 1; min-height: 42px; padding: 8px 14px; font-size: 15px;
  border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text);
}
#m-chat-input:disabled { opacity: .55; }
#m-chat-send {
  min-width: 76px; border: 1px solid var(--accent); background: var(--accent); color: var(--on-accent);
  border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
}
main#m-list { padding-bottom: 86px; }
</style>
</head>
<body>
  <header class="m-header">
    <span class="m-brand">🦫 KarvyLoop</span>
    <span id="m-remote-chip" style="display:none" title="">🔗</span>
    <span class="m-waiting"><span id="m-waiting-label"></span><span id="m-count"></span></span>
    <button id="m-remote">🌐</button>
    <button id="m-refresh">↻</button>
  </header>
  <main id="m-list"></main>
  <div id="m-chat-log"></div>
  <footer class="m-chat-bar">
    <input id="m-chat-input" type="text" maxlength="4000" enterkeyhint="send">
    <button id="m-chat-send"></button>
  </footer>
  <script src="/static/i18n.js"></script>
  <script src="/static/e2e.js"></script>
  <script src="/static/tunnel.js"></script>
  <script src="/static/m.js"></script>
</body>
</html>
