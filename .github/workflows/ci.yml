name: CI

# Green check = "clone it and the whole suite runs" is externally verifiable.
# Dev-time infra only: this never ships in the runtime (see CONTRIBUTING.md).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- Lint gate: ruff (check only, no autofix). Fast, runs first. ---
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --upgrade ruff
      - name: ruff check
        run: ruff check .

  # --- Test gate: install .[dev] so every optional test dep is present, then run pytest. ---
  # This is what turns "2773 tests, 0 collection errors" into a visible green check.
  # A bare `pip install -e .` (no [dev]) is exactly what produced the "81 collection error"
  # report — respx / psutil live in the [dev] extra. Installing .[dev] fixes it at the root.
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev/optional deps
        # .[dev,mcp,relay] covers respx/psutil (dev) + the two optional-feature test paths
        # that otherwise self-skip via pytest.importorskip. playwright/redis stay out on
        # purpose (browser download / external service); those tests skip themselves.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp,relay]"
      - name: pytest
        # grep-subprocess K-lock tests are native on Linux (grep is on PATH), so no deselect
        # is needed here — the Windows-only false reds are handled in the (P2) matrix TODO below.
        run: python -m pytest -q

  # --- Windows gate: karvyloop/platform/win/ is real code (AppContainer / LowBox /
  # RestrictedToken / JobObject), so the cross-platform claim needs at least one
  # non-Linux leg. Single py3.12 on purpose — no matrix, Actions minutes are budgeted
  # for a 1-3 person team. Tier-3 true-adversarial sandbox tests self-skip when the
  # runner forbids RestrictedToken/AppContainer probing (guards in tests/test_win_sandbox.py,
  # same skip-not-fail policy as tests/test_landlock.py); pure-logic tests run everywhere.
  # The old KLawScan grep-subprocess false reds are root-fixed (tests/_scan.py grep_py,
  # OS-portable) — no deselect needed here either.
  test-windows:
    name: pytest (windows, py3.12)
    runs-on: windows-latest
    timeout-minutes: 25    # windows runners are ~2x slower than ubuntu; suite is ~10min there
    env:
      # Windows console defaults to a legacy codepage (e.g. GBK) — the suite prints and
      # asserts UTF-8 (Chinese) output, so pin all Python I/O to UTF-8 explicitly.
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + dev/optional deps
        # Same extras as the Linux job + [files] (pypdf/python-docx/openpyxl are pure
        # Python — exercises the attachment-extraction lane on Windows too).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp,relay,files]"
      - name: pytest
        run: python -m pytest -q

  # --- macOS gate: karvyloop/platform/darwin/ (Seatbelt / sandbox-exec) is the third
  # real sandbox backend, so the cross-platform claim now has all three legs
  # (ubuntu / windows / macos — this closes the old P2 TODO, docs/58 §5 item 9).
  # Single py3.12, no matrix, and a tight timeout on purpose: macOS runner minutes
  # bill at 10x Linux for a 1-3 person team's budget. True-adversarial seatbelt tests
  # (tests/test_seatbelt_profile.py §2) self-skip when the runner forbids real
  # sandbox-exec — same skip-not-fail policy as tests/test_landlock.py; pure-logic
  # profile tests run everywhere.
  test-macos:
    name: pytest (macos, py3.12)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + dev/optional deps
        # Same extras as the Windows job — [files] is pure Python, exercises the
        # attachment-extraction lane on macOS too.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp,relay,files]"
      - name: pytest
        run: python -m pytest -q
